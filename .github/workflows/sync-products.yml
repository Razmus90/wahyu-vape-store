name: Sync Products Every 30 Minutes

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          # Ensure URL ends with / and construct full endpoint URL
          BASE_URL="${{ secrets.VERCEL_DEPLOYMENT_URL }}"
          BASE_URL="${BASE_URL%/}"  # Remove trailing slash if present
          FULL_URL="${BASE_URL}/api/cron/sync-products"
          echo "Calling: $FULL_URL"
          curl -X GET \
            -H "Content-Type: application/json" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPAS_SECRET }}" \
            "$FULL_URL" \
            --fail \
            --silent \
            --show-error
        env:
          VERCEL_DEPLOYMENT_URL: ${{ secrets.VERCEL_DEPLOYMENT_URL }}
          VERCEL_AUTOMATION_BYPAS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPAS_SECRET }}
