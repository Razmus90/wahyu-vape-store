name: Sync Products Every 30 Minutes

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -X GET \
            -H "Content-Type: application/json" \
            "${{ secrets.VERCEL_DEPLOYMENT_URL }}/api/cron/sync-products" \
            --fail \
            --silent \
            --show-error
        env:
          VERCEL_DEPLOYMENT_URL: ${{ secrets.VERCEL_DEPLOYMENT_URL }}
